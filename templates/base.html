<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Medical Diagnosis Expert System{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <script>
    (function () {
      const saved = localStorage.getItem("medexpert-theme");
      const theme = saved || "light";
      // #region agent log
      const payload = {sessionId:'42d9a8',runId:'run1',hypothesisId:'H1',location:'templates/base.html:11',message:'initial theme bootstrap',data:{savedTheme:saved,appliedTheme:theme,path:window.location.pathname},timestamp:Date.now()};
      fetch('/_debug/client-log',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(()=>{});
      fetch('http://127.0.0.1:7259/ingest/57fa0c5d-e67f-4a5e-9280-52ed5e7082e8',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'42d9a8'},body:JSON.stringify(payload)}).catch(()=>{});
      // #endregion
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="site-header">
    <div class="wrap header-row">
      <div>
        <a href="{{ url_for('index') }}" class="brand">MedExpert Clinical</a>
        <span class="tagline">Intelligent triage decision support interface</span>
      </div>
      <div class="header-actions">
        <span class="status-pill no-print">System Status: Online</span>
        <button id="theme-toggle" class="btn btn-ghost no-print" type="button" aria-label="Toggle dark mode">
          Toggle Theme
        </button>
      </div>
    </div>
  </header>
  <main class="wrap main-content">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="wrap">
      <p>{{ disclaimer_short }}</p>
    </div>
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>
</html>
