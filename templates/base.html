<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Medical Diagnosis Expert System{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <script>
    (function () {
      const saved = localStorage.getItem("medexpert-theme");
      const theme = saved || "light";
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="site-header">
    <div class="wrap header-row">
      <div>
        <a href="{{ url_for('index') }}" class="brand">MedExpert Clinical</a>
        <span class="tagline">Intelligent triage decision support interface</span>
      </div>
      <div class="header-actions">
        <span class="status-pill no-print">System Status: Online</span>
        <button id="theme-toggle" class="btn btn-ghost no-print" type="button" aria-label="Toggle dark mode">
          Toggle Theme
        </button>
      </div>
    </div>
  </header>
  <main class="wrap main-content">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="wrap">
      <p>{{ disclaimer_short }}</p>
    </div>
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>
</html>
